<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PIRIS - Восстановление пароля</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260405-69" />
  </head>
  <body>
    <main class="auth-page auth-page-minimal">
      <section class="auth-showcase">
        <div class="auth-showcase-top">
          <a class="brand-link" href="./index.html">
            <img
              class="brand-logo auth-brand-logo"
              src="./assets/logo-piris.png"
              alt="PIRIS"
            />
          </a>
        </div>

        <div class="auth-reasons static-reasons">
          <div class="reason-stage reason-stage-static">
            <div class="reason-set active static-set">
              <article class="reason-item">
                <span class="reason-index">01</span>
                <strong>Быстрое восстановление доступа</strong>
              </article>
              <article class="reason-item">
                <span class="reason-index">02</span>
                <strong>Ссылка придет на почту</strong>
              </article>
              <article class="reason-item">
                <span class="reason-index">03</span>
                <strong>После этого можно снова войти в кабинет</strong>
              </article>
            </div>
          </div>
        </div>

        <div class="auth-showcase-copy">
          <h1>Восстановление пароля</h1>
          <p class="auth-lead compact">
            Укажи e-mail, и мы отправим ссылку для сброса пароля.
          </p>
        </div>
      </section>

      <section class="auth-card-shell">
        <div class="auth-card-minimal">
          <div class="auth-card-head">
            <p class="eyebrow">Сброс пароля</p>
          </div>

          <form class="auth-form minimal-form">
            <label>
              E-mail
              <input type="email" placeholder="name@company.ru" />
            </label>

            <button type="button" class="primary-button auth-button">
              Отправить ссылку
            </button>
          </form>

          <div class="auth-card-footer">
            <a class="text-link dark-link" href="./index.html">Вернуться ко входу</a>
            <a class="text-link dark-link muted-link" href="./register.html">Создать аккаунт</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
